services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chankang-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-chankang_platform}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      UPLOAD_DIR: /app/uploads
      ALLOW_LOCAL_UPLOAD_FALLBACK: ${ALLOW_LOCAL_UPLOAD_FALLBACK:-true}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - chankang-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chankang-frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - chankang-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend_uploads:
    driver: local

networks:
  chankang-network:
    driver: bridge
