name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm ci --prefix backend
      - name: Build and test
        run: npm run check
